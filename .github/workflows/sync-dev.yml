name: Sync and deploy dev

on:
  push:
    branches: [main]

jobs:
  sync-and-deploy-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fast-forward dev to main
        run: |
          git checkout dev 2>/dev/null || git checkout -b dev
          git merge --ff-only origin/main
          git push origin dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Patch wrangler config for dev (remove production routes)
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('dist/server/wrangler.json', 'utf8'));
            cfg.name = 'runners-in-need-dev';
            cfg.routes = [];
            cfg.workers_dev = true;
            delete cfg.env;
            fs.writeFileSync('dist/server/wrangler.json', JSON.stringify(cfg));
          "

      - name: Deploy to Cloudflare Workers (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/server/wrangler.json --keep-vars

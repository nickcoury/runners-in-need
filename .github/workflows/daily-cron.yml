name: Daily cron

on:
  schedule:
    # 8:00 AM UTC = 1:00 AM MST — low-traffic window
    - cron: '0 8 * * *'
  workflow_dispatch: # manual trigger for testing

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily cron job
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            "https://runnersinneed.com/api/cron/daily" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" != "200" ] && [ "$http_code" != "207" ]; then
            echo "::error::Cron job failed with status $http_code"
            exit 1
          fi
          if [ "$http_code" = "207" ]; then
            echo "::warning::Cron job completed with partial failures"
          fi
